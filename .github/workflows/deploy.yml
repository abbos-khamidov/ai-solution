name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск из GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Переменные для сборки (публичные)
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="/var/www/aisolution"
            cd $APP_DIR

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Installing dependencies..."
            npm ci --omit=dev

            echo "→ Building app..."
            npm run build

            echo "→ Restarting PM2..."
            pm2 restart aisolution || pm2 start npm --name "aisolution" -- start

            echo "→ Saving PM2 config..."
            pm2 save

            echo "✓ Deploy complete!"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "❌ <b>Deploy FAILED</b>\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\n<a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Смотреть логи</a>",
              "parse_mode": "HTML"
            }'

      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "✅ <b>Deploy SUCCESS</b>\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}",
              "parse_mode": "HTML"
            }'
