version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ai_solution
      POSTGRES_USER: ai_solution_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_solution_user -d ai_solution"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,backend,aisolution.uz,www.aisolution.uz"
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://aisolution.uz,https://www.aisolution.uz"
      DJANGO_CORS_ALLOWED_ORIGINS: "https://aisolution.uz,https://www.aisolution.uz"
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DATABASE_URL: "postgresql://ai_solution_user:${DB_PASSWORD:-supersecret123}@db:5432/ai_solution"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_PERSONAL_CHAT_ID: ${TELEGRAM_PERSONAL_CHAT_ID}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@aisolution.uz}
      LEADS_EMAIL_TO: ${LEADS_EMAIL_TO:-imabboskhamidov@gmail.com}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: "https://aisolution.uz"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_SITE_URL: "https://aisolution.uz"
      DJANGO_API_BASE_URL: "http://backend:8000"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHAT_DEMO_API_KEY: ${CHAT_DEMO_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  certbot-webroot:
